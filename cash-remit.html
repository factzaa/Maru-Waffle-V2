<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>เงินสดนำส่ง · Maru Waffle</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1A1A1A">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  body{background:#FFFCEF;}
  .wrap{max-width:560px;margin:0 auto;padding:0 14px 80px;}
  .rcard{background:#fff;border-radius:18px;padding:16px;box-shadow:0 4px 16px rgba(120,86,0,.12);margin-bottom:14px;}
  .rcard .ttl{font-family:'Kanit';font-weight:700;font-size:16px;color:#1A1A1A;display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .big-amt{font-family:'Kanit';font-weight:800;font-size:34px;color:#1E9E50;line-height:1.1;}
  .sub{font-size:12.5px;color:#7A6B4A;font-family:'Sarabun';}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed #EFE6CF;font-family:'Sarabun';font-size:14px;}
  .row:last-child{border-bottom:0;}
  .row .r{font-weight:700;font-family:'Kanit';}
  .calc{background:#FFF7E0;border-radius:12px;padding:11px 13px;margin:10px 0;}
  .calc .row{border-bottom:1px dashed #ECDFB4;}
  .btn{width:100%;border:0;border-radius:13px;padding:14px;font-family:'Kanit';font-weight:700;font-size:15.5px;cursor:pointer;background:#1A1A1A;color:#FFC629;margin-top:6px;}
  .btn.green{background:#1E9E50;color:#fff;}
  .btn.ghost{background:#fff;color:#1A1A1A;border:1.5px solid #E8DFC4;}
  .pill{display:inline-block;font-family:'Kanit';font-weight:700;font-size:11px;padding:3px 10px;border-radius:20px;}
  .pill.submitted{background:#FEF3C7;color:#92400E;}
  .pill.confirmed{background:#DCFCE7;color:#15803D;}
  .pill.flagged{background:#FEE2E2;color:#B91C1C;}
  .warn{background:#FEF3C7;border-left:3px solid #F59E0B;border-radius:10px;padding:10px 12px;font-size:13px;color:#92400E;font-family:'Sarabun';margin-top:8px;}
  .hist{border:1px solid #ECE6D6;border-radius:13px;padding:12px;margin-bottom:9px;}
  .hist .top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;}
  .hist .meta{font-size:12px;color:#7A6B4A;font-family:'Sarabun';line-height:1.6;}
  .slipimg{max-width:120px;border-radius:8px;border:1px solid #E8DFC4;margin-top:6px;display:block;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:18px;}
  .modal-bg.show{display:flex;}
  .modal{background:#fff;border-radius:18px;max-width:420px;width:100%;padding:20px;max-height:90vh;overflow-y:auto;}
  .modal h3{font-family:'Kanit';font-weight:700;font-size:17px;margin:0 0 14px;color:#1A1A1A;}
  .modal label{display:block;font-family:'Kanit';font-weight:600;font-size:13px;color:#5A5247;margin:10px 0 5px;}
  .modal input[type=text],.modal input[type=number],.modal textarea{width:100%;box-sizing:border-box;border:1.5px solid #E8DFC4;border-radius:11px;padding:11px;font-family:'Sarabun';font-size:15px;}
  .loading,.empty{text-align:center;color:#8A8170;font-size:14px;padding:24px 12px;font-family:'Sarabun';line-height:1.6;}
</style>
</head>
<body>
  <div class="head">
    <h1 style="font-family:'Kanit';font-weight:800;font-size:21px;color:#2E2400;margin:0;">เงินสดนำส่ง</h1>
    <div class="sub" style="color:#6B5300;">ตรวจสอบ · นำส่ง · ยืนยันรับเงิน</div>
  </div>
  <div class="wrap">
    <div id="pendingBox"><div class="rcard"><div class="loading">กำลังโหลด...</div></div></div>
    <div id="confirmBox"></div>
    <div class="rcard">
      <div class="ttl">🧾 ประวัติการนำส่ง</div>
      <div id="histBox"><div class="loading">กำลังโหลด...</div></div>
    </div>
  </div>

  <div class="modal-bg" id="submitModal">
    <div class="modal">
      <h3>บันทึกการนำส่งเงินสด</h3>
      <div class="calc" id="mCalc"></div>
      <label>ผู้นำส่ง *</label>
      <input type="text" id="mBy" placeholder="ชื่อพนักงานที่นำเงินเข้าบัญชี">
      <label>ยอดที่นำส่งจริง (บาท) *</label>
      <input type="number" inputmode="decimal" id="mAmt" placeholder="0">
      <label>แนบสลิป (ไม่บังคับ)</label>
      <button type="button" class="btn ghost" id="mSlipBtn" style="margin-top:0;">📎 แนบสลิปโอน</button>
      <img id="mSlipPv" class="slipimg" style="display:none;">
      <label>หมายเหตุ</label>
      <textarea id="mNote" rows="2" placeholder="เช่น โอนเข้าบัญชี กสิกร ..."></textarea>
      <button class="btn green" id="mSave" style="margin-top:14px;">✓ บันทึกการนำส่ง</button>
      <button class="btn ghost" id="mCancel">ยกเลิก</button>
    </div>
  </div>

<script src="shared.js"></script>
<script>
injectShell('cashRemit');
registerSW();
var $ = function(id){return document.getElementById(id);};
function baht(n){ return '฿'+Math.round(Number(n)||0).toLocaleString('en-US'); }
var pend = null, slipObj = null;

async function loadAll(){
  try{ pend = await api('getRemitPending', {}); renderPending(); }
  catch(e){ $('pendingBox').innerHTML='<div class="rcard"><div class="empty">โหลดไม่ได้: '+escHtml(e.message)+'</div></div>'; }
  try{ var h = await api('getRemitHistory', {}); renderHistory(h.remits||[]); renderConfirm(h.remits||[]); }
  catch(e){ $('histBox').innerHTML='<div class="empty">โหลดประวัติไม่ได้</div>'; }
}

function renderPending(){
  var d = pend;
  var daysHtml = d.days.length ? d.days.map(function(x){
    return '<div class="row"><span>'+x.dateDM+' <span class="sub">('+escHtml(x.closedBy||'')+')</span></span><span class="r">'+baht(x.cash)+'</span></div>';
  }).join('') : '<div class="empty">ยังไม่มีวันที่ปิดรอบในรอบนี้</div>';
  var expHtml = d.expenses.length ? d.expenses.map(function(x){
    return '<div class="row"><span>'+x.dateDM+' '+escHtml(x.item||'-')+'</span><span class="r" style="color:#B91C1C;">-'+baht(x.amount)+'</span></div>';
  }).join('') : '<div class="sub" style="padding:6px 0;">ไม่มีค่าใช้จ่าย POS ในรอบนี้</div>';
  var warn = (d.notClosed && d.notClosed.length) ? '<div class="warn">⚠️ มี '+d.notClosed.length+' วันที่ยังไม่ปิดรอบ จะไม่ถูกนำมารวม (ปิดรอบก่อนถ้าต้องการรวม)</div>' : '';
  $('pendingBox').innerHTML =
    '<div class="rcard">'
    + '<div class="ttl">💰 เงินสดรอนำส่ง</div>'
    + '<div class="sub">รอบ: '+(d.periodStart?d.periodStart:'-')+' ถึง '+d.periodEnd+'</div>'
    + '<div style="margin:10px 0;"><div class="big-amt">'+baht(d.netAmount)+'</div><div class="sub">ยอดนำส่งจริง (หลังหักค่าใช้จ่าย POS)</div></div>'
    + '<div class="calc">'
    +   '<div class="row"><span>ยอดขายเงินสดรวม ('+d.days.length+' วัน)</span><span class="r">'+baht(d.cashTotal)+'</span></div>'
    +   '<div class="row"><span>หัก ค่าใช้จ่าย POS</span><span class="r" style="color:#B91C1C;">-'+baht(d.expenseTotal)+'</span></div>'
    +   '<div class="row"><span><b>คงเหลือนำส่ง</b></span><span class="r" style="color:#1E9E50;">'+baht(d.netAmount)+'</span></div>'
    + '</div>'
    + warn
    + '<div class="ttl" style="font-size:14px;margin-top:14px;">รายวันที่นับ</div>'+daysHtml
    + '<div class="ttl" style="font-size:14px;margin-top:12px;">ค่าใช้จ่าย POS (เงินออกจากลิ้นชัก)</div>'+expHtml
    + '<button class="btn green" id="openSubmit"'+(d.days.length?'':' disabled style="opacity:.5;"')+'>📤 บันทึกการนำส่ง</button>'
    + '</div>';
  if($('openSubmit')) $('openSubmit').addEventListener('click', openSubmit);
}

function renderConfirm(remits){
  var pendingC = remits.filter(function(r){ return r.status==='submitted'; });
  if(!pendingC.length){ $('confirmBox').innerHTML=''; return; }
  $('confirmBox').innerHTML = '<div class="rcard"><div class="ttl">🔐 รอเจ้าของยืนยันรับเงิน</div>'
    + pendingC.map(function(r){
      var diff = Number(r.diff)||0;
      var diffTxt = diff===0 ? 'ตรงพอดี' : (diff>0?'เกิน ':'ขาด ')+baht(Math.abs(diff));
      return '<div class="hist">'
        + '<div class="top"><b style="font-family:Kanit;">'+baht(r.submitted_amount)+'</b><span class="pill submitted">รอยืนยัน</span></div>'
        + '<div class="meta">รอบ '+(r.period_start||'-')+' ถึง '+(r.period_end||'-')+'<br>ระบบคำนวณ '+baht(r.net_amount)+' · นำส่งจริง '+baht(r.submitted_amount)+' · <b>'+diffTxt+'</b><br>โดย '+escHtml(r.submitted_by||'-')+(r.note?(' · '+escHtml(r.note)):'')+'</div>'
        + (r.slip_url?'<a href="'+r.slip_url+'" target="_blank"><img class="slipimg" src="'+r.slip_url+'"></a>':'')
        + '<div style="display:flex;gap:8px;margin-top:10px;">'
        +   '<button class="btn green" style="margin:0;" data-confirm="'+r.id+'">✓ ยืนยันรับเงิน</button>'
        +   '<button class="btn ghost" style="margin:0;" data-flag="'+r.id+'">ทักท้วง</button>'
        + '</div></div>';
    }).join('') + '</div>';
  $('confirmBox').querySelectorAll('[data-confirm]').forEach(function(b){ b.addEventListener('click', function(){ doConfirm(b.getAttribute('data-confirm'), 'confirm'); }); });
  $('confirmBox').querySelectorAll('[data-flag]').forEach(function(b){ b.addEventListener('click', function(){ doConfirm(b.getAttribute('data-flag'), 'flag'); }); });
}

function renderHistory(remits){
  if(!remits.length){ $('histBox').innerHTML='<div class="empty">ยังไม่มีประวัติการนำส่ง</div>'; return; }
  $('histBox').innerHTML = remits.map(function(r){
    var st = r.status||'submitted';
    var label = st==='confirmed'?'ยืนยันแล้ว':(st==='flagged'?'ทักท้วง':'รอยืนยัน');
    return '<div class="hist"><div class="top"><b style="font-family:Kanit;">'+baht(r.submitted_amount)+'</b><span class="pill '+st+'">'+label+'</span></div>'
      + '<div class="meta">รอบ '+(r.period_start||'-')+' → '+(r.period_end||'-')+' · ระบบคำนวณ '+baht(r.net_amount)+'<br>ส่งโดย '+escHtml(r.submitted_by||'-')+(r.confirmed_by?(' · ยืนยันโดย '+escHtml(r.confirmed_by)):'')+'</div>'
      + (r.slip_url?'<a href="'+r.slip_url+'" target="_blank"><img class="slipimg" src="'+r.slip_url+'"></a>':'')
      + '</div>';
  }).join('');
}

function openSubmit(){
  if(!pend || !pend.days.length) return;
  slipObj = null;
  $('mCalc').innerHTML = '<div class="row"><span>ยอดขายเงินสด</span><span class="r">'+baht(pend.cashTotal)+'</span></div>'
    + '<div class="row"><span>หักค่าใช้จ่าย POS</span><span class="r" style="color:#B91C1C;">-'+baht(pend.expenseTotal)+'</span></div>'
    + '<div class="row"><span><b>ยอดนำส่ง (ระบบคำนวณ)</b></span><span class="r" style="color:#1E9E50;">'+baht(pend.netAmount)+'</span></div>';
  $('mBy').value=''; $('mAmt').value=Math.round(pend.netAmount); $('mNote').value='';
  $('mSlipPv').style.display='none'; $('mSlipBtn').innerHTML='📎 แนบสลิปโอน';
  $('submitModal').classList.add('show');
}
$('mCancel').addEventListener('click', function(){ $('submitModal').classList.remove('show'); });
$('submitModal').addEventListener('click', function(e){ if(e.target===$('submitModal')) $('submitModal').classList.remove('show'); });
$('mSlipBtn').addEventListener('click', function(){
  setReceiptHandler(function(file){
    maruCompressImage(file).then(function(r){ if(!r) return; slipObj={base64:r.base64,mime:r.mime,name:r.name}; $('mSlipPv').src=r.dataUrl; $('mSlipPv').style.display='block'; $('mSlipBtn').innerHTML='✓ แนบสลิปแล้ว · เปลี่ยน'; });
  });
  openReceiptSheet();
});
$('mSave').addEventListener('click', function(){
  var by=$('mBy').value.trim(); if(!by){ toast('กรอกชื่อผู้นำส่ง'); return; }
  var amt=parseFloat($('mAmt').value)||0;
  var btn=this; btn.disabled=true; btn.textContent='กำลังบันทึก...';
  api('submitRemit', { data:{ submittedBy:by, submittedAmount:amt, slip:slipObj, note:$('mNote').value.trim() } })
    .then(function(res){ btn.disabled=false; btn.textContent='✓ บันทึกการนำส่ง'; if(res&&res.ok){ toast(res.msg||'บันทึกแล้ว ✓'); $('submitModal').classList.remove('show'); loadAll(); } else { toast(res.error||'บันทึกไม่สำเร็จ'); } })
    .catch(function(e){ btn.disabled=false; btn.textContent='✓ บันทึกการนำส่ง'; toast('ผิดพลาด: '+e.message); });
});

function doConfirm(id, type){
  var code = prompt(type==='confirm' ? '🔐 ใส่รหัสเจ้าของ เพื่อยืนยันรับเงิน' : 'ใส่รหัสเจ้าของ เพื่อทักท้วง');
  if(!code) return;
  var note = (type==='flag') ? (prompt('เหตุผลที่ทักท้วง (ไม่บังคับ)')||'') : '';
  api('confirmRemit', { id:id, ownerCode:code, actionType:(type==='flag'?'flag':'confirm'), confirmedBy:'เจ้าของ', note:note })
    .then(function(res){ if(res&&res.ok){ toast(res.msg||'สำเร็จ ✓'); loadAll(); } else { toast((res&&res.error)||'ไม่สำเร็จ'); } })
    .catch(function(e){ toast('รหัสไม่ถูกต้อง หรือผิดพลาด'); });
}

loadAll();
</script>
</body>
</html>

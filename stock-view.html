<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ตรวจสต๊อก · Maru Waffle</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#FFC629">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">

<style>
/* page-specific */
.stock-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stock-summary .sk{background:#fff;border-radius:12px;padding:11px 13px;text-align:center;}
.stock-summary .sk .v{font-family:'Kanit';font-weight:800;font-size:22px;color:var(--ink);line-height:1;}
.stock-summary .sk .l{font-size:11px;color:var(--ink-2);margin-top:3px;}
.stock-summary .sk.warn .v{color:#F37316;}
.stock-summary .sk.bad  .v{color:var(--red);}

.stock-list{display:flex;flex-direction:column;gap:8px;}
.stock-row{background:#fff;border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px;border-left:4px solid transparent;}
.stock-row.low{border-left-color:#F37316;background:#FFFBEB;}
.stock-row.out{border-left-color:var(--red);background:#FEF2F2;}
.stock-row .info{flex:1;min-width:0;}
.stock-row .nm{font-family:'Kanit';font-weight:600;font-size:14px;color:var(--ink);}
.stock-row .meta{font-size:11.5px;color:var(--ink-2);margin-top:1px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.stock-row .meta .pill{background:#F2EEDD;color:var(--ink-2);padding:1px 7px;border-radius:8px;font-size:10.5px;font-weight:600;}
.stock-row .meta .pill.mode-count{background:#FEF3C7;color:#92400E;}
.stock-row .bal{text-align:right;flex:none;}
.stock-row .bal .n{font-family:'Kanit';font-weight:800;font-size:18px;color:var(--ink);line-height:1;}
.stock-row .bal .u{font-size:11px;color:var(--ink-2);}
.stock-row.low .bal .n{color:#F37316;}
.stock-row.out .bal .n{color:var(--red);}
</style>
</head>
<body>

<div class="app">
  <div class="head">
    <img class="logo" src="icon-192.png" alt="">
    <h1>ตรวจสต๊อก</h1>
    <div class="sub">Maru Waffle · คงเหลือ ณ ปัจจุบัน</div>
  </div>

  <div class="sheet">
    <div class="card">
      <div class="h"><span class="ic" style="background:linear-gradient(135deg,#3DD5DC,#1B98A4);" data-icon="store"></span>คงเหลือสต๊อก</div>

      <div class="stock-summary" id="stockSummary"></div>

      <div class="stock-filters">
        <input type="search" id="stockSearch" placeholder="ค้นหารายการ...">
      </div>
      <div class="stock-filters" id="stockCatChips" style="background:transparent;padding:0;margin-top:-4px;">
        <button class="stock-cat-chip on" data-cat="all">ทั้งหมด</button>
        <button class="stock-cat-chip" data-cat="Waffle">🧁 Waffle</button>
        <button class="stock-cat-chip" data-cat="KUFF">🥐 KUFF</button>
        <button class="stock-cat-chip" data-cat="Drink">🥤 Drink</button>
        <button class="stock-cat-chip" data-cat="Other">📦 อื่นๆ</button>
        <button class="stock-cat-chip" data-cat="low" style="background:#FEF3C7;border-color:#FCD34D;color:#92400E;">⚠️ ของใกล้หมด</button>
      </div>

      <div class="stock-list" id="stockList"><div style="text-align:center;color:var(--ink-2);padding:20px;font-size:13px;">กำลังโหลด...</div></div>
    </div>
    <div class="foot">🐤 ข้อมูลอัปเดตทันทีหลังจากเบิก/รับเข้า/ปิดร้าน</div>
  </div>
</div>

<script src="shared.js"></script>
<script>
injectShell('stockView');
registerSW();

let stockData = { items: [], summary: {}, filter: { cat: 'all', q: '' } };

function loadStockView(){
  document.getElementById('stockList').innerHTML = '<div style="text-align:center;color:var(--ink-2);padding:20px;font-size:13px;">กำลังโหลด...</div>';
  apiSWR('getStockBalances', {}, function(res){
      stockData.items = res.items || [];
      stockData.summary = res.summary || {};
      renderStockSummary();
      renderStockList();
    })
    .catch(function(err){
      document.getElementById('stockList').innerHTML = '<div style="color:var(--red);padding:14px;font-size:13px;">โหลดไม่ได้: '+escHtml(err.message)+'<br><br>ถ้ายังไม่ได้รัน <code>setupStock</code> ใน Apps Script editor → ให้รันก่อน</div>';
    });
}
function renderStockSummary(){
  const s = stockData.summary;
  document.getElementById('stockSummary').innerHTML =
    '<div class="sk"><div class="v">'+(s.total||0)+'</div><div class="l">รายการทั้งหมด</div></div>'
    +'<div class="sk warn"><div class="v">'+(s.lowStock||0)+'</div><div class="l">⚠️ ใกล้หมด</div></div>'
    +'<div class="sk bad"><div class="v">'+(s.outOfStock||0)+'</div><div class="l">🚫 หมดสต๊อก</div></div>';
}
function renderStockList(){
  const q = (stockData.filter.q || '').toLowerCase();
  const cat = stockData.filter.cat;
  const filtered = stockData.items.filter(function(it){
    if(!it.active) return false;
    if(cat === 'low')      { if(!it.lowStock && it.balance > 0) return false; }
    else if(cat !== 'all') { if(it.category !== cat) return false; }
    if(q && it.name.toLowerCase().indexOf(q) < 0) return false;
    return true;
  });
  const box = document.getElementById('stockList');
  if(!filtered.length){
    box.innerHTML = '<div style="text-align:center;color:var(--ink-2);padding:20px;font-size:13px;">ไม่พบรายการ</div>';
    return;
  }
  box.innerHTML = filtered.map(function(it){
    const cls = it.balance <= 0 ? 'out' : (it.lowStock ? 'low' : '');
    const modePill = it.mode === 'count' ? '<span class="pill mode-count">โหมด: ชั่งกรัม</span>' : '<span class="pill">โหมด: นับชิ้น</span>';
    const meta = '<span>'+escHtml(it.category)+'</span>'+modePill
      +(it.minStock>0 ? '<span>ขั้นต่ำ '+it.minStock+' '+escHtml(it.unit)+'</span>' : '');
    const todayInfo = (it.todayWithdraw>0 || it.todayReceive>0)
      ? '<div style="font-size:11px;color:var(--ink-2);margin-top:2px;">วันนี้: '
        +(it.todayReceive>0?'<span style="color:var(--green-ok);">+'+it.todayReceive+'</span> ':'')
        +(it.todayWithdraw>0?'<span style="color:var(--red);">-'+it.todayWithdraw+'</span>':'')
        +'</div>'
      : '';
    return '<div class="stock-row '+cls+'">'
      +'<div class="info"><div class="nm">'+escHtml(it.name)+'</div><div class="meta">'+meta+'</div>'+todayInfo+'</div>'
      +'<div class="bal"><div class="n">'+it.balance+'</div><div class="u">'+escHtml(it.unit)+'</div></div>'
      +'</div>';
  }).join('');
}

document.getElementById('stockSearch').addEventListener('input', function(){
  stockData.filter.q = this.value; renderStockList();
});
document.querySelectorAll('#stockCatChips .stock-cat-chip').forEach(function(b){
  b.addEventListener('click', function(){
    document.querySelectorAll('#stockCatChips .stock-cat-chip').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    stockData.filter.cat = b.dataset.cat;
    renderStockList();
  });
});

renderIcons();
loadStockView();
</script>
</body>
</html>
